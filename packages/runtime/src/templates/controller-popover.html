<div data-controller-popover hidden>
  <section role="dialog" aria-modal="true" aria-labelledby="presso-controller-title">
    <header>
      <h2 id="presso-controller-title">Phone controller</h2>
      <button data-action="controller-close" type="button" aria-label="Close phone controller">Close</button>
    </header>
    <div data-controller-qr aria-label="Controller QR code"></div>
    <p>Scan the selected controller URL.</p>
    <div data-controller-url-current>
      <a data-controller-url href="#" target="_blank" rel="noreferrer">Controller link</a>
      <a data-controller-url-open href="#" target="_blank" rel="noreferrer" aria-label="Open selected controller URL">
        <span aria-hidden="true">↗</span>
      </a>
    </div>
    <fieldset data-controller-url-list>
      <legend>Controller URL</legend>
    </fieldset>
  </section>
</div>
