<div data-edit-overlay hidden>
  <section role="dialog" aria-modal="true" aria-labelledby="presso-edit-title">
    <form data-edit-form>
      <header>
        <div>
          <p data-edit-source></p>
          <h2 id="presso-edit-title">Edit slide</h2>
        </div>
        <button data-action="edit-cancel" type="button" aria-label="Close editor">Close</button>
      </header>
      <label>
        <span>Metadata</span>
        <textarea data-edit-metadata spellcheck="false"></textarea>
      </label>
      <label>
        <span>Body</span>
        <textarea data-edit-body spellcheck="false"></textarea>
      </label>
      <label>
        <span>Notes</span>
        <textarea data-edit-notes spellcheck="false"></textarea>
      </label>
      <p data-edit-error role="alert" hidden></p>
      <footer>
        <button data-action="edit-cancel" type="button">Cancel</button>
        <button data-edit-save type="submit">Save</button>
      </footer>
    </form>
  </section>
</div>
