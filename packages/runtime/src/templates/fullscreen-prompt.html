<div data-presso-chrome data-fullscreen-prompt hidden>
  <section role="dialog" aria-modal="true" aria-labelledby="presso-fullscreen-title">
    <h2 id="presso-fullscreen-title" data-fullscreen-title>Full screen</h2>
    <p data-fullscreen-message>Confirm the fullscreen change on this presentation.</p>
    <button data-action="fullscreen-confirm" data-fullscreen-confirm type="button">Continue</button>
    <button data-action="fullscreen-dismiss" type="button">Dismiss</button>
  </section>
</div>
