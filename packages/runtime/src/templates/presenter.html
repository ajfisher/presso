<main>
  <section>
    <h1 data-current-title></h1>
    {{deck}}
  </section>
  <section>
    <p>Next: <strong data-next-title></strong></p>
    <p>Target: <strong data-timing></strong></p>
    <div>
      <button data-action="prev">Back</button>
      <button data-action="next">Next</button>
      <button data-action="fullscreen">Full screen</button>
      <button data-action="font-minus">A-</button>
      <button data-action="font-plus">A+</button>
      <button data-action="shortcuts">?</button>
    </div>
    <article data-current-notes></article>
  </section>
</main>
