name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and unit test
        run: make check

      - name: Locate runner Chrome
        id: chrome
        shell: bash
        run: |
          set -euo pipefail
          candidates=(
            "${CHROME_BIN:-}"
            "${CHROME_PATH:-}"
            /usr/bin/google-chrome-stable
            /usr/bin/google-chrome
            /usr/bin/chromium-browser
            /usr/bin/chromium
          )

          for browser in "${candidates[@]}"; do
            if [[ -n "$browser" && -x "$browser" ]]; then
              echo "PRESSO_PLAYWRIGHT_EXECUTABLE=$browser" >> "$GITHUB_ENV"
              echo "path=$browser" >> "$GITHUB_OUTPUT"
              "$browser" --version
              exit 0
            fi
          done

          echo "No runner Chrome/Chromium executable found; falling back to Playwright Chromium."
          echo "path=" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        if: steps.chrome.outputs.path == ''
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Chromium fallback
        if: steps.chrome.outputs.path == ''
        timeout-minutes: 3
        run: npm exec playwright install chromium

      - name: Browser smoke
        run: make browser-smoke
